<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Card Akhtar Faizi Putra</title>
    <link rel="icon" href="img/logo-color.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="fontawesome-free-6.5.1-web/css/all.min.css" />
  </head>
  <body>
    <div class="container">
      <div class="card" id="myCard">
        <div class="card_inner">
          <div class="front_face">
            <img src="img/foto_akhtar.jpeg" alt="" />
            <button class="click_me_button">Klik Saya</button>
          </div>

          <div class="back_face">
            <h2><a href="#" class="no-color-link">Akhtar Faizi Putra</a></h2>
            <p>Mahasiswa Teknik Informatika PNJ</p>
            <div class="social_media">
              <a href="https://github.com/akhtarerror/" class="no-color-link">
                <div class="icon_container">
                  <i class="fab fa-github"></i>
                </div>
              </a>
              <a
                href="https://www.youtube.com/@akhtarerror7654"
                class="no-color-link"
              >
                <div class="icon_container">
                  <i class="fab fa-youtube"></i>
                </div>
              </a>
              <a
                href="https://www.linkedin.com/in/akhtar-faizi-putra-0a32a9220/"
                class="no-color-link"
              >
                <div class="icon_container">
                  <i class="fab fa-linkedin-in"></i>
                </div>
              </a>
              <a
                href="https://www.instagram.com/akhtarerror/"
                class="no-color-link"
              >
                <div class="icon_container">
                  <i class="fab fa-instagram"></i>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="fontawesome-free-6.5.1-web/js/all.min.js"></script>
    <script>
      document.getElementById("myCard").addEventListener("click", function () {
        this.classList.toggle("flipped");
      });
    </script>
  </body>
</html>
